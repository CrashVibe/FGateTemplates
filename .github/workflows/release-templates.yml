name: Release Templates

on:
  push:
    branches: [main]
    paths:
      - "packages/*/package.json"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-templates
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Determine changed packages
        id: changed
        run: |
          BEFORE="${{ github.event.before }}"
          PACKAGES=""
          for dir in packages/*/; do
            pkg="${dir%/}"
            pkg="${pkg#packages/}"
            version=$(jq -r .version "packages/$pkg/package.json")
            if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              changed=true
            else
              old_version=$(git show "$BEFORE:packages/$pkg/package.json" 2>/dev/null | jq -r .version 2>/dev/null || echo "")
              [ "$old_version" != "$version" ] && changed=true || changed=false
            fi
            if [ "$changed" = "true" ]; then
              echo "  -> $pkg ($version) changed, will rebuild"
              PACKAGES="$PACKAGES $pkg"
            fi
          done
          echo "packages=$PACKAGES" >> "$GITHUB_OUTPUT"

      - name: Build all packages
        if: steps.changed.outputs.packages != ''
        run: |
          for dir in packages/*/; do
            pkg="${dir%/}"
            pkg="${pkg#packages/}"
            echo "::group::Build $pkg"
            bun run --cwd "packages/$pkg" build
            echo "::endgroup::"
          done

      - name: Update release notes
        if: steps.changed.outputs.packages != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          notes="FGate Nexus 官方图片模板。每个模板对应一个 zip，随 packages/*/package.json 的版本号变化增量构建并替换。

          ## 模板列表

          | 文件 | 名称 | 描述 |
          | --- | --- | --- |"
          for dir in packages/*/; do
            pkg="${dir%/}"
            pkg="${pkg#packages/}"
            version=$(jq -r .version "packages/$pkg/dist/manifest.json")
            name=$(jq -r .name "packages/$pkg/dist/manifest.json")
            description=$(jq -r .description "packages/$pkg/dist/manifest.json")
            notes="$notes
          | $pkg-$version.zip | $name | $description |"
          done
          if gh release view templates >/dev/null 2>&1; then
            gh release edit templates --notes "$notes"
          else
            gh release create templates --title "FGate 官方模板" --notes "$notes"
          fi

      - name: Upload changed packages
        if: steps.changed.outputs.packages != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for pkg in ${{ steps.changed.outputs.packages }}; do
            echo "::group::Upload $pkg"
            version=$(jq -r .version "packages/$pkg/package.json")
            zip_name="$pkg-$version.zip"
            (cd "packages/$pkg/dist" && zip -r "../../../$zip_name" .)
            gh release upload templates "$zip_name" --clobber
            rm "$zip_name"
            echo "::endgroup::"
          done
